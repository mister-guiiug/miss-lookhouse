project_id = "miss-lookhouse"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.listing-media]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[auth]
enabled = true
# Remplacer par l'URL du site déployé (GitHub Pages) en production.
site_url = "http://127.0.0.1:5214"
additional_redirect_urls = ["https://mister-guiiug.github.io/miss-lookhouse/"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
enable_confirmations = true
secure_password_change = true

# MFA TOTP (Pro plan) — recommandé pour durcir l'accès.
[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2
