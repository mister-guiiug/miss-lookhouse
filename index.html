<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Anti-FOUC : applique le thème avant tout rendu. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('lh_theme');
          var eff =
            v === 'light' || v === 'dark'
              ? v
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', eff);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta id="meta-theme-color" name="theme-color" content="#0f766e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Miss LookHouse" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <meta
      name="description"
      content="Veille immobilière responsable : surveillez vos zones, historisez les annonces, repérez doublons et baisses de prix."
    />
    <title>Miss LookHouse</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
